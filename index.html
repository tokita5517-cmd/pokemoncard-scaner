<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケカ価格チェック</title>
<style>
  body { background: #0a0a0f; color: white; font-family: sans-serif; padding: 20px; }
  .card { background: #13131a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
  input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #1c1c28; color: white; box-sizing: border-box; }
  button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .btn-main { background: #ff3b5c; color: white; }
  .btn-sub { background: #333; color: white; }
  #result { margin-top: 20px; padding: 15px; background: #1c1c28; border-radius: 10px; display: none; }
  .price { color: #ff9f1c; font-weight: bold; }
</style>
</head>
<body>

<div class="card">
  <h2>ポケカ価格サーチ</h2>
  <p style="font-size: 12px; color: #888;">設定からAPIキーを入れてね ⚙️</p>
  <input type="text" id="cardName" placeholder="例: ピカチュウ SAR">
  <button class="btn-main" onclick="search()">検索する</button>
  <button class="btn-sub" onclick="openSettings()">⚙️ 設定 (APIキー入力)</button>
</div>

<div id="loading" style="display:none; text-align:center; margin-top:20px;">💎 解析中...</div>
<div id="result"></div>

<script>
let apiKey = localStorage.getItem('pokeca_key') || '';

function openSettings() {
  const key = prompt("Google AI StudioでコピーしたAPIキーを入れてね", apiKey);
  if (key) {
    apiKey = key.trim();
    localStorage.setItem('pokeca_key', apiKey);
    alert("保存したよ！");
  }
}

async function search() {
  if (!apiKey) return alert("先に設定からAPIキーを入れてね！");
  
  const name = document.getElementById('cardName').value;
  if (!name) return alert("カード名を入れてね");

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  try {
    // URLを「gemini-1.5-flash-latest」に変更して、より確実に！
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;

    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: `ポケモンカード「${name}」の買取価格を教えて。必ず以下のJSON形式で答えて。{"name":"カード名","price":"10,000円"}` }]
        }],
        // 安全設定をすべてオフにする
        safetySettings: [
          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
        ]
      })
    });

    const data = await response.json();

    if (data.error) {
      throw new Error(`エラーコード: ${data.error.code}\nメッセージ: ${data.error.message}`);
    }

    const text = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);

    const resDiv = document.getElementById('result');
    resDiv.innerHTML = `<h3>${json.name}</h3><p>予想買取価格: <span class="price">${json.price}</span></p>`;
    resDiv.style.display = 'block';

  } catch (err) {
    alert("エラーになっちゃった:\n" + err.message);
    console.error(err);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}
</script>

</body>
</html>
