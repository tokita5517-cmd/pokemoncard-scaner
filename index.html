<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケカ査定DX Premium 最終形態</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; border-radius: 10px; display: none; margin-top: 15px; border: 2px solid #ff0000; }
        #res { margin-top: 20px; background: #111; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-wrap; min-height: 100px; border: 1px solid #222; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1 style="color:#ff0000">ポケカ査定DX Premium</h1>
    <div class="box">
        <input type="text" id="api-key" placeholder="AIza...のキーをここに貼る">
        <label for="img" class="btn" style="background:#444">📷 カードを撮影</label>
        <input type="file" id="img" accept="image/*" capture="environment" style="display:none">
        <img id="preview">
        <button id="go" class="btn" style="display:none; margin-top:15px">✨ 鑑定を開始する</button>
    </div>
    <div id="res">準備完了！</div>

<script>
    const keyInp = document.getElementById('api-key'),
          imgInp = document.getElementById('img'),
          pre    = document.getElementById('preview'),
          btn    = document.getElementById('go'),
          res    = document.getElementById('res');

    let b64 = null;
    let mimeType = 'image/jpeg'; // ← ファイルごとに上書きする

    imgInp.onchange = e => {
        const f = e.target.files[0];
        if (!f) return;

        // ★修正①: 実際のMIMEタイプを取得
        mimeType = f.type || 'image/jpeg';

        const r = new FileReader();
        r.onload = ev => {
            pre.src = ev.target.result;
            pre.style.display = 'block';
            btn.style.display = 'block';
            b64 = ev.target.result.split(',')[1];
        };
        r.readAsDataURL(f);
    };

    btn.onclick = async () => {
        const key = keyInp.value.trim();
        if (!key) return alert('キーを入れてね！');
        if (!b64)  return alert('カード画像を選んでね！');

        res.innerText = "有料エンジンで超速鑑定中...";
        btn.disabled = true;

        try {
            // ★修正②: モデルを最新の gemini-2.0-flash に更新
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "このポケモンカードの名前、レアリティ、最新のメルカリ相場を詳しく教えて。" },
                            // ★修正①: mimeType を動的に使用
                            { inlineData: { mimeType: mimeType, data: b64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            // APIエラー処理
            if (data.error) {
                const msg = data.error.message || '';
                if (msg.includes('API key not valid') || msg.includes('API_KEY_INVALID')) {
                    throw new Error('APIキーが無効だよ。コピーミスや有効化待ちの可能性あり！');
                }
                throw new Error(msg || 'APIエラーが発生しました');
            }

            // ★修正③: candidates・finishReason・セーフティフィルターを正しく処理
            const candidate = data.candidates?.[0];
            if (!candidate) {
                throw new Error('応答が空でした。もう一度試してみて！');
            }

            if (candidate.finishReason === 'SAFETY') {
                throw new Error('セーフティフィルターにかかってしまいました。別の角度から撮り直してみて！');
            }

            const text = candidate.content?.parts?.[0]?.text;
            if (text) {
                res.innerText = text;
            } else {
                throw new Error('テキストを取得できませんでした。もう一度撮ってみて！');
            }

        } catch (e) {
            res.innerHTML = `<span style="color:#ff6b6b">❌ エラー: ${e.message}<br><br>💡 解決しない場合は、キーを作り直して5分待ってから試してみて！</span>`;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
