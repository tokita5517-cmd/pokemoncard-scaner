<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケカ査定DX Premium FINAL</title>
    <style>
        :root { --accent: #ff0000; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: #1a1a1a; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; }
        #preview { width: 100%; border-radius: 10px; display: none; margin-top: 15px; border: 2px solid var(--accent); }
        #res { width: 100%; max-width: 400px; background: #111; padding: 15px; border-radius: 10px; font-size: 14px; white-space: pre-wrap; line-height: 1.6; border: 1px solid #222; min-height: 100px; }
    </style>
</head>
<body>
    <h1 style="color:var(--accent)">ポケカ査定DX Premium</h1>
    <div class="box">
        <label style="font-size:11px; color:#888;">Google Cloud APIキーを貼り付け</label>
        <input type="text" id="api-key" placeholder="AIza...で始まるキー">
        <label for="img" class="btn" style="background:#444">📷 カードを撮影</label>
        <input type="file" id="img" accept="image/*" capture="environment" style="display:none">
        <img id="preview">
        <button id="go" class="btn" style="display:none; margin-top:15px">✨ プレミアム査定を開始</button>
    </div>
    <div id="res">ここに結果が出ます</div>

<script>
    const keyInp = document.getElementById('api-key'), imgInp = document.getElementById('img'), pre = document.getElementById('preview'), btn = document.getElementById('go'), res = document.getElementById('res');
    let b64 = null;

    imgInp.onchange = e => {
        const f = e.target.files[0];
        if(!f) return;
        const r = new FileReader();
        r.onload = ev => {
            pre.src = ev.target.result;
            pre.style.display = 'block';
            btn.style.display = 'block';
            b64 = ev.target.result.split(',')[1];
        };
        r.readAsDataURL(f);
    };

    btn.onclick = async () => {
        const key = keyInp.value.trim();
        if(!key) return alert('キーを入れてね！');
        res.innerText = "有料版エンジンで鑑定中...";
        btn.disabled = true;

        try {
            // 【重要】有料版キーに最も適した最新の安定URL（v1）に変更しました
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "このポケモンカードの名前、レアリティ、現在のメルカリ相場を詳しく教えて。" },
                        { inlineData: { mimeType: "image/jpeg", data: b64 } }
                    ]}]
                })
            });

            const data = await response.json();
            
            if(data.error) {
                // エラーの詳細を表示
                throw new Error(data.error.message);
            }

            if(data.candidates && data.candidates[0].content) {
                res.innerText = data.candidates[0].content.parts[0].text;
            } else {
                res.innerText = "解析に失敗しました。もう一度撮ってみて！";
            }

        } catch (e) {
            res.innerHTML = `<span style="color:#ff6b6b">エラー: ${e.message}<br><br>※Google Cloudで「Generative Language API」が有効になっているか確認してね。</span>`;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
