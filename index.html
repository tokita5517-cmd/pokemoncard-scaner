<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケカ査定 最終テスト</title>
<style>
  body { background: #050508; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
  .box { background: #12121a; padding: 30px; border-radius: 20px; border: 1px solid #333; }
  input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #1c1c28; color: white; box-sizing: border-box; }
  button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; background: #ff3b5c; color: white; font-size: 18px; cursor: pointer; }
  #res { margin-top: 30px; font-size: 24px; color: #ff9f1c; display: none; }
</style>
</head>
<body>

<div class="box">
  <h2>ポケカ査定テスト</h2>
  <input type="text" id="name" placeholder="カード名を入力">
  <button onclick="start()">査定する</button>
  <div id="res"></div>
</div>

<script>
// ★ここにたかちんのAPIキーを直接貼り付けてね！
// 例: const MY_KEY = 'AIza...';
const MY_KEY = 'ここにAPIキーを貼り付けてね'; 

async function start() {
  const name = document.getElementById('name').value;
  if(!name) return alert("カード名を入れてね");
  if(MY_KEY.includes("ここに")) return alert("プログラムの中にAPIキーを貼り付けて保存してね！");

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${MY_KEY}`;
    
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `「${name}」の買取価格を1つ教えて。JSON形式 {"p":"1000円"} で。` }] }]
      })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error.message);

    const txt = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);

    const r = document.getElementById('res');
    r.innerText = name + " の価格: " + json.p;
    r.style.display = 'block';
  } catch(e) {
    alert("エラー: " + e.message);
    console.log(e);
  }
}
</script>
</body>
</html>
