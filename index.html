<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ポケカ価格">
<title>ポケカ買い取りサーチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: rgba(255,255,255,0.08);
  --text: #f2f2f8;
  --muted: #6b6b80;
  --accent: #ff3b5c;
  --accent2: #ff9f1c;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
header { padding: 50px 20px 15px; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Dela Gothic One', cursive; font-size: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.settings-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; }
main { padding: 20px; max-width: 600px; margin: 0 auto; }
.search-card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 24px; }
.search-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
input[type="text"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 14px; outline: none; }
.btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: white; padding: 0 20px; }
.btn-camera { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 100%; padding: 14px; margin-top: 10px; }
.loader { display: none; text-align: center; padding: 20px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); width: 100%; max-width: 500px; border-radius: 28px; padding: 24px; border: 1px solid var(--border); }
.res-card-name { font-family: 'Dela Gothic One'; font-size: 22px; color: var(--accent2); text-align: center; margin-bottom: 15px; }
.shop-item { background: var(--surface2); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<header>
  <div class="logo">POKÉCA CHECK</div>
  <button class="settings-btn" onclick="openSettings()">⚙️</button>
</header>

<main>
  <div class="search-card">
    <div class="search-input-group">
      <input type="text" id="cardInput" placeholder="カード名を入力">
      <button class="btn btn-primary" onclick="searchByText()">検索</button>
    </div>
    <button class="btn btn-camera" onclick="triggerCamera()">📷 写真で検索</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  </div>
  <div id="loader" class="loader">🔍 調査中...</div>
  <div id="historyList"></div>
</main>

<div id="resultOverlay" class="overlay">
  <div class="modal">
    <div id="resultContent"></div>
    <button class="btn btn-primary" style="width:100%; margin-top:20px; padding:12px;" onclick="closeModal('resultOverlay')">閉じる</button>
  </div>
</div>

<div id="settingsOverlay" class="overlay">
  <div class="modal">
    <h3>設定</h3>
    <input type="text" id="apiKeyInput" style="width:100%; margin-bottom:20px;" placeholder="APIキーを入力">
    <button class="btn btn-primary" style="width:100%; padding:14px;" onclick="saveSettings()">保存</button>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('gemini_api_key') || '';
document.getElementById('apiKeyInput').value = apiKey;

function openSettings() { document.getElementById('settingsOverlay').style.display = 'flex'; }
function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('gemini_api_key', apiKey);
  document.getElementById('settingsOverlay').style.display = 'none';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function triggerCamera() { document.getElementById('cameraInput').click(); }
document.getElementById('cameraInput').onchange = async (e) => {
  if (e.target.files[0]) {
    const reader = new FileReader();
    reader.onload = (ev) => searchByAI(ev.target.result);
    reader.readAsDataURL(e.target.files[0]);
  }
};

async function searchByText() {
  const query = document.getElementById('cardInput').value.trim();
  if (query) searchByAI(null, query);
}

async function searchByAI(imageBase64, textQuery = "") {
  if (!apiKey) return openSettings();
  document.getElementById('loader').style.display = 'block';

  try {
    const prompt = `以下のカードの買取価格をJSON形式で教えて。{"cardName":"名","shops":[{"name":"店","buyPrice":1000}]} 形式で。対象: ${textQuery || "画像"}`;
    const parts = [{ text: prompt }];
    if (imageBase64) parts.push({ inline_data: { mime_type: "image/jpeg", data: imageBase64.split(',')[1] } });

    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: parts }],
        // 【重要】ここでセーフティ設定を強制オフにしているよ！
        safetySettings: [
          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
        ],
        generationConfig: { temperature: 0.2 }
      })
    });

    const data = await resp.json();
    const text = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
    
    let html = `<div class="res-card-name">${json.cardName}</div>`;
    json.shops.forEach(s => {
      html += `<div class="shop-item"><span>${s.name}</span><b>¥${s.buyPrice.toLocaleString()}</b></div>`;
    });
    document.getElementById('resultContent').innerHTML = html;
    document.getElementById('resultOverlay').style.display = 'flex';
  } catch (e) {
    alert("エラーが発生したよ。APIキーや画像を確認してね。");
  } finally {
    document.getElementById('loader').style.display = 'none';
  }
}
</script>
</body>
</html>
