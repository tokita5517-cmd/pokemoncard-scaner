<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケカ査定DX v2</title>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --accent-color: #c1272d; --text-color: #e0e0e0; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; }
        .section { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        input[type="text"] { width: 100%; padding: 12px; background: #262626; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; background: var(--accent-color); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; border-radius: 10px; display: none; margin: 15px 0; border: 2px solid var(--accent-color); }
        #result-area { margin-top: 20px; padding: 15px; background: #161616; border-radius: 10px; font-size: 14px; white-space: pre-wrap; min-height: 100px; border: 1px solid #2a2a2a; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:var(--accent-color); text-align:center;">ポケカ査定DX FINAL</h1>
    <div class="section">
        <label style="font-size:12px; color:#aaa;">STEP 1: APIキーを貼り付け</label>
        <input type="text" id="api-key" placeholder="ここをタップしてペースト">
    </div>
    <div class="section">
        <label style="font-size:12px; color:#aaa;">STEP 2: カードを撮影</label>
        <label for="image-input" class="btn" style="background:#333; margin-top:10px;">📷 カメラを起動</label>
        <input type="file" id="image-input" accept="image/*" capture="environment" style="display:none;">
        <img id="preview">
        <button id="search-btn" class="btn" style="display:none; margin-top:15px;">✨ 今度こそ査定する！</button>
    </div>
    <div id="result-area">「ゼロの大空洞」を査定するよ！</div>
</div>

<script>
    const apiKeyInput = document.getElementById('api-key');
    const imageInput = document.getElementById('image-input');
    const preview = document.getElementById('preview');
    const searchBtn = document.getElementById('search-btn');
    const resultArea = document.getElementById('result-area');
    let base64Image = null;

    imageInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            preview.src = event.target.result;
            preview.style.display = 'block';
            searchBtn.style.display = 'flex';
            base64Image = event.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    });

    searchBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) return alert('キーを入れてね！');
        resultArea.textContent = "AIが本気で鑑定中...";
        searchBtn.disabled = true;

        try {
            // エラーを回避するために、複数のURLを試すようにしました
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "このポケモンカードの名前と市場価格を日本語で教えて。" },
                            { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            resultArea.textContent = data.candidates[0].content.parts[0].text;

        } catch (error) {
            resultArea.innerHTML = `<span style="color:#ff6b6b">エラー: ${error.message}<br><br>※GitHubの反映に時間がかかっているかも。あと1分待って画面を強く更新してみて！</span>`;
        } finally {
            searchBtn.disabled = false;
        }
    });
</script>
</body>
</html>
