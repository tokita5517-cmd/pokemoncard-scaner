<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ査定DX</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --accent-color: #c1272d;
            --text-color: #ffffff;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(193, 39, 45, 0.3);
        }

        /* 入力エリアをはっきりさせる */
        .section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        /* ボタンのデザイン */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.98);
            filter: brightness(1.2);
        }

        /* カメラボタン用の特別なスタイル */
        .file-label {
            background: #444;
            margin-bottom: 10px;
        }

        #image-input {
            display: none; /* 本物のボタンは隠す */
        }

        #preview {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border: 2px solid var(--accent-color);
        }

        #result-area {
            margin-top: 20px;
            padding: 15px;
            background: #262626;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 50px;
            white-space: pre-wrap;
        }

        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ポケカ査定DX</h1>

    <div class="section">
        <label>STEP 1: APIキーを入力</label>
        <input type="text" id="api-key" placeholder="AI Studioのキーをペースト">
        <p class="status" id="key-status">※キーは保存されません（安全です）</p>
    </div>

    <div class="section">
        <label>STEP 2: カードを撮影</label>
        <label for="image-input" class="btn file-label">📷 カメラを起動する</label>
        <input type="file" id="image-input" accept="image/*" capture="environment">
        
        <img id="preview" src="" alt="プレビュー">
        
        <button id="search-btn" class="btn" style="display:none;">✨ 査定を開始する</button>
    </div>

    <div id="result-area">ここに結果が表示されるよ！</div>
</div>

<script>
    const apiKeyInput = document.getElementById('api-key');
    const imageInput = document.getElementById('image-input');
    const preview = document.getElementById('preview');
    const searchBtn = document.getElementById('search-btn');
    const resultArea = document.getElementById('result-area');

    let base64Image = null;

    // 画像が選ばれたらプレビューを表示
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            preview.src = event.target.result;
            preview.style.display = 'block';
            searchBtn.style.display = 'block'; // 画像があれば査定ボタンを出す
            base64Image = event.target.result.split(',')[1];
            resultArea.textContent = "「査定を開始する」を押してね！";
        };
        reader.readAsDataURL(file);
    });

    // 査定ボタンのクリックイベント
    searchBtn.addEventListener('click', async function() {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert('先にAPIキーを入れてね！');
            return;
        }

        resultArea.textContent = "AIがカードを鑑定中... 少々お待ちください。";
        searchBtn.disabled = true;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "このポケモンカードの名前、レアリティ、そしてメルカリなどのフリマアプリでの相場（円）を日本語で教えてください。最後に、このカードの強さや魅力を一言添えて。" },
                            { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            resultArea.textContent = text;

        } catch (error) {
            resultArea.textContent = "エラーが発生したよ: " + error.message;
        } finally {
            searchBtn.disabled = false;
        }
    });
</script>

</body>
</html>
