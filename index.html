<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケカ査定DX Premium</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; border-radius: 10px; display: none; margin-top: 15px; border: 2px solid #ff0000; }
        #res { margin-top: 20px; background: #111; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-wrap; min-height: 100px; border: 1px solid #222; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1 style="color:#ff0000">ポケカ査定DX Premium</h1>
    <div class="box">
        <input type="text" id="api-key" placeholder="Claude APIキーを貼ってね（sk-ant-...）">
        <label for="img" class="btn" style="background:#444">📷 カードを撮影</label>
        <input type="file" id="img" accept="image/*" capture="environment" style="display:none">
        <img id="preview">
        <button id="go" class="btn" style="display:none; margin-top:15px">✨ プレミアム査定を開始</button>
    </div>
    <div id="res">カードを撮影してAPIキーを入れてね！</div>

<script>
    const keyInp = document.getElementById('api-key'), imgInp = document.getElementById('img'), pre = document.getElementById('preview'), btn = document.getElementById('go'), res = document.getElementById('res');
    let b64 = null, mimeType = 'image/jpeg';

    imgInp.onchange = e => {
        const f = e.target.files[0];
        if(!f) return;
        mimeType = f.type || 'image/jpeg';
        const r = new FileReader();
        r.onload = ev => {
            pre.src = ev.target.result; pre.style.display = 'block'; btn.style.display = 'block';
            b64 = ev.target.result.split(',')[1];
        };
        r.readAsDataURL(f);
    };

    btn.onclick = async () => {
        const key = keyInp.value.trim();
        if(!key) { res.innerText = 'APIキーを入力してください'; return; }
        if(!b64) { res.innerText = 'カードを撮影してください'; return; }
        res.innerText = 'Claude AIで鑑定中...';
        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 1024,
                    messages: [{
                        role: 'user',
                        content: [
                            {
                                type: 'image',
                                source: { type: 'base64', media_type: mimeType, data: b64 }
                            },
                            {
                                type: 'text',
                                text: 'このポケモンカードについて以下を教えてください：\n1. カード名\n2. レアリティ（記号や番号から判断）\n3. 収録セット\n4. メルカリでの現在の相場（予想）\n5. 状態による価格の変動\n\nわかりやすく日本語で教えてください。'
                            }
                        ]
                    }]
                })
            });
            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            res.innerText = data.content[0].text;
        } catch (e) {
            res.innerHTML = `<span style="color:#ff6b6b">エラー: ${e.message}</span>`;
        }
    };
</script>
</body>
</html>
