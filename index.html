<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ポケカ買取サーチDX</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #050508; --card: #12121a; --accent: #ff3b5c; --gold: #ff9f1c; --text: #ffffff; }
  body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  
  header { padding: 20px; background: rgba(5,5,8,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'Dela Gothic One'; color: var(--accent); font-size: 20px; }
  
  main { padding: 20px; max-width: 500px; margin: 0 auto; }
  .search-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
  input { width: 100%; background: #1c1c28; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 12px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
  
  .btn { width: 100%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; padding: 15px; font-size: 16px; transition: 0.2s; }
  .btn-main { background: var(--accent); color: #fff; }
  .btn-camera { background: #222; color: #fff; margin-top: 10px; border: 1px solid #444; }

  #keyStatus { font-size: 11px; text-align: center; margin-bottom: 10px; padding: 4px; border-radius: 5px; }
  .status-ok { background: #10b98122; color: #10b981; }
  .status-ng { background: #ef444422; color: #ef4444; }

  #resultArea { margin-top: 25px; display: none; }
  .res-card { background: var(--card); border-radius: 20px; padding: 20px; border-left: 6px solid var(--gold); }
  .res-name { font-family: 'Dela Gothic One'; font-size: 22px; color: var(--gold); margin-bottom: 15px; }
  .shop-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
  .price { font-family: 'Dela Gothic One'; color: var(--accent); font-size: 20px; }

  #loading { display: none; text-align: center; margin: 30px 0; }
  .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 下へ移動ボタン */
  #downBtn { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 24px; box-shadow: 0 5px 15px rgba(255,59,92,0.4); z-index: 200; cursor: pointer; display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">POKÉCA DX</div>
  <button onclick="setKey()" style="background:none; border:none; font-size:22px; cursor:pointer;">⚙️</button>
</header>

<main>
  <div id="keyStatus" class="status-ng">APIキーを設定してください ⚙️</div>

  <div class="search-box">
    <input type="text" id="cardInput" placeholder="カード名を入力 (例: ナンジャモ SAR)">
    <button class="btn btn-main" onclick="runAI(null)">査定スタート！</button>
    <button class="btn btn-camera" onclick="document.getElementById('camIn').click()">📷 写真を撮って査定</button>
    <input type="file" id="camIn" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>AIが最新価格を確認中...</p>
  </div>

  <div id="resultArea"></div>
</main>

<button id="downBtn" onclick="scrollToBottom()">↓</button>

<script>
let API_KEY = localStorage.getItem('pokeca_dx_key') || '';

function checkKey() {
  const st = document.getElementById('keyStatus');
  if(API_KEY) {
    st.innerText = "API準備完了 ✅";
    st.className = "status-ok";
  } else {
    st.innerText = "APIキー未設定 ⚙️";
    st.className = "status-ng";
  }
}
checkKey();

function setKey() {
  const k = prompt("Gemini APIキーを入力:", API_KEY);
  if(k) {
    API_KEY = k.trim();
    localStorage.setItem('pokeca_dx_key', API_KEY);
    checkKey();
  }
}

function scrollToBottom() {
  window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

window.onscroll = function() {
  const btn = document.getElementById('downBtn');
  if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};

async function handleFile(input) {
  if(!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = (e) => runAI(e.target.result);
  reader.readAsDataURL(input.files[0]);
}

async function runAI(imgBase64) {
  if(!API_KEY) return alert("⚙️からキーを設定してね");
  const query = document.getElementById('cardInput').value || "このカード";
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';

  try {
    const prompt = `ポケモンカード「${query}」の買取価格を教えて。必ずJSONで返答して。{"cardName":"カード名","shops":[{"name":"店A","price":1000}]}`;

    // ★404エラー対策：URLを v1beta にして最新モデルを指定
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const body = {
      contents: [{ parts: [{ text: prompt }] }],
      safetySettings: [
        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
      ]
    };

    if(imgBase64) {
      body.contents[0].parts.push({
        inline_data: { mime_type: "image/jpeg", data: imgBase64.split(',')[1] }
      });
    }

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if(data.error) throw new Error(data.error.message);

    const rawText = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]);

    renderResult(json);
  } catch (err) {
    alert("エラー: " + err.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResult(data) {
  const area = document.getElementById('resultArea');
  area.innerHTML = `
    <div class="res-card">
      <div class="res-name">${data.cardName}</div>
      ${data.shops.map(s => `
        <div class="shop-row">
          <span>${s.name}</span>
          <span class="price">¥${s.price.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>
  `;
  area.style.display = 'block';
  setTimeout(scrollToBottom, 200);
}
</script>
</body>
</html>
