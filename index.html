<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケカサーチ 最終版</title>
<style>
  body { background: #0a0a0f; color: white; font-family: sans-serif; padding: 20px; }
  .box { background: #13131a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
  input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #1c1c28; color: white; box-sizing: border-box; }
  button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #ff3b5c; color: white; }
  #res { margin-top: 20px; padding: 15px; background: #1c1c28; border-radius: 10px; display: none; }
</style>
</head>
<body>

<div class="box">
  <h2>ポケカ価格サーチ</h2>
  <p id="st" style="color:#888; font-size:12px;">APIキーを入れてね ⚙️</p>
  <input type="text" id="name" placeholder="例: リザードン SAR">
  <button onclick="search()">査定する</button>
  <button onclick="setKey()" style="background:#333; margin-top:10px;">⚙️ 設定</button>
</div>

<div id="loading" style="display:none; text-align:center; margin-top:20px;">💎 AIが調査中...</div>
<div id="res"></div>

<script>
let key = localStorage.getItem('pokekey') || '';
if(key) document.getElementById('st').innerText = "準備OK! ✅";

function setKey() {
  const k = prompt("APIキー(AIza...)を入れてね", key);
  if(k) { key = k.trim(); localStorage.setItem('pokekey', key); location.reload(); }
}

async function search() {
  if(!key) return alert("設定からキーを入れてね");
  const val = document.getElementById('name').value;
  document.getElementById('loading').style.display = 'block';

  try {
    // ★ここが超重要！「flash-8b」という一番軽いモデルを使う
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${key}`;

    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `「${val}」の買取価格をJSONで教えて。{"name":"${val}","price":"1000円"}` }] }]
      })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error.message);

    const txt = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);

    const r = document.getElementById('res');
    r.innerHTML = `<h3>${json.name}</h3><p style="color:#ff9f1c; font-size:24px;">${json.price}</p>`;
    r.style.display = 'block';
  } catch(e) {
    alert("エラー: " + e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}
</script>
</body>
</html>
