<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケカ査定</title>
<style>
  body { background: #050508; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
  .box { background: #12121a; padding: 25px; border-radius: 20px; border: 1px solid #333; }
  .status { font-size: 12px; margin-bottom: 15px; padding: 8px; border-radius: 8px; }
  .status-ng { background: #ff3b5c22; color: #ff3b5c; border: 1px solid #ff3b5c; }
  .status-ok { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc71; }
  input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #1c1c28; color: white; box-sizing: border-box; }
  .btn-search { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; background: #ff3b5c; color: white; font-size: 18px; cursor: pointer; }
  .btn-config { width: 100%; padding: 10px; margin-top: 15px; border-radius: 8px; border: 1px solid #555; background: #222; color: white; cursor: pointer; }
  #res { margin-top: 20px; padding: 15px; background: #1c1c28; border-radius: 15px; display: none; border: 2px solid #ff9f1c; }
</style>
</head>
<body>

<div class="box">
  <h2>ポケカ査定</h2>
  
  <div id="st" class="status-ng">❌ APIキーが設定されていません</div>

  <input type="text" id="cardName" placeholder="カード名を入力">
  <button class="btn-search" onclick="doSearch()">査定スタート</button>
  
  <button class="btn-config" onclick="saveKey()">⚙️ APIキーを貼り付ける</button>
</div>

<div id="loading" style="display:none; margin-top:20px;">💎 調査中...</div>
<div id="res"></div>

<script>
let myKey = localStorage.getItem('pokekey_final') || '';

// 画面を開いたときにキーをチェック
function check() {
  const s = document.getElementById('st');
  if(myKey && myKey.length > 20) {
    s.innerText = "✅ API準備完了！";
    s.className = "status status-ok";
  }
}
check();

// ⚙️ボタンを押したときの処理
function saveKey() {
  const k = prompt("Google AI Studioの『AIza...』を貼り付けてね");
  if(k) {
    myKey = k.trim();
    localStorage.setItem('pokekey_final', myKey);
    check();
    alert("保存したよ！");
  }
}

async function doSearch() {
  if(!myKey) return alert("下のグレーのボタンからAPIキーを入れてね！");
  const name = document.getElementById('cardName').value;
  if(!name) return alert("カード名を入れてね");

  document.getElementById('loading').style.display = 'block';
  document.getElementById('res').style.display = 'none';

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${myKey}`;
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `${name}のポケカ買取価格をJSONで教えて。{"name":"${name}","price":"1000円"}` }] }]
      })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error.message);

    const txt = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);

    const r = document.getElementById('res');
    r.innerHTML = `<h3>${json.name}</h3><p style="color:#ff9f1c; font-size:28px; font-weight:bold;">${json.price}</p>`;
    r.style.display = 'block';
  } catch(e) {
    alert("エラー: キーをもう一度確認してね！");
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}
</script>
</body>
</html>
